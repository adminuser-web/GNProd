name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate: lint + unit tests (+coverage) + build. Must pass to merge. ──────
  verify:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      - name: Dependency audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── E2E journeys + accessibility (Playwright). ───────────────────────────
  e2e:
    name: E2E + a11y (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      - name: Accessibility (axe)
        run: npm run test:a11y
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── RLS / policy tests against a throwaway local Supabase. ───────────────
  rls:
    name: RLS / policy (local Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: npm ci
      - name: Start local Supabase (applies migrations)
        run: supabase start
      - name: Run RLS tests
        run: |
          eval "$(supabase status -o env | sed 's/^/export /; s/API_URL/SUPABASE_TEST_URL/; s/^export ANON_KEY/export SUPABASE_ANON_KEY/; s/^export SERVICE_ROLE_KEY/export SUPABASE_SERVICE_ROLE_KEY/')"
          npm run test:rls
      - name: Stop Supabase
        if: always()
        run: supabase stop || true

# Deployment is handled by Vercel (auto-deploys on push to the connected branch).
